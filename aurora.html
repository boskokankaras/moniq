:root{--bg:#dde3f5;--card:rgba(255,255,255,0.55);--card-solid:#fff;--text:#1e2330;--sub:#6b7280;--border:rgba(255,255,255,0.75);--primary:#4361ee;--r:20px;--sw:240px;--glass-blur:20px;--glow:rgba(67,97,238,0.12)}
body.dark{--bg:#0a0a0f;--card:rgba(255,255,255,0.05);--card-solid:#12121a;--text:#e8eaf0;--sub:#8892a4;--border:rgba(255,255,255,0.1);--primary:#4361ee;--glass-blur:20px;--glow:rgba(67,97,238,0.35)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Satoshi',-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;background:var(--bg);color:var(--text);transition:background .2s,color .2s;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;animation:bgShift 15s ease-in-out infinite alternate}
body:not(.dark)::before{background:radial-gradient(ellipse 60% 50% at 10% 10%,rgba(67,97,238,0.18) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 90% 85%,rgba(124,58,237,0.14) 0%,transparent 60%),radial-gradient(ellipse 40% 40% at 80% 10%,rgba(16,185,129,0.10) 0%,transparent 55%),radial-gradient(ellipse 35% 35% at 15% 80%,rgba(239,68,68,0.08) 0%,transparent 55%)}
body.dark::before{background:radial-gradient(ellipse 60% 50% at 15% 15%,rgba(67,97,238,0.35) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 85% 80%,rgba(124,58,237,0.30) 0%,transparent 60%),radial-gradient(ellipse 40% 40% at 75% 15%,rgba(16,185,129,0.12) 0%,transparent 55%),radial-gradient(ellipse 35% 35% at 20% 75%,rgba(239,68,68,0.10) 0%,transparent 55%)}
@keyframes bgShift{0%{opacity:1}50%{opacity:0.75}100%{opacity:1}}
#app{position:relative;z-index:1}
html{overflow-x:hidden}
#app{display:flex;min-height:100vh}
#sidebar{width:var(--sw);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;padding:24px 16px;z-index:100}
body:not(.dark) #sidebar{background:rgba(255,255,255,0.5);border-right:1px solid rgba(255,255,255,0.7);box-shadow:4px 0 24px rgba(67,97,238,0.06)}
body.dark #sidebar{background:rgba(8,8,14,0.75);border-right:1px solid rgba(255,255,255,0.08);box-shadow:4px 0 24px rgba(0,0,0,0.3)}
#main{margin-left:var(--sw);flex:1;padding:24px;min-height:100vh;overflow-x:hidden;max-width:100%}
#bottom-nav{display:none}
@media(max-width:768px){
  #sidebar{display:none}
  #bottom-nav{display:flex;align-items:center;position:fixed;bottom:18px;left:12px;right:12px;background:rgba(18,18,26,0.85);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border-radius:24px;z-index:100;padding:6px 4px;box-shadow:0 8px 32px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,0.08);border:1px solid var(--border);height:72px}
  body:not(.dark) #bottom-nav{background:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.8)}
  #main{margin-left:0;padding:16px 16px 116px;overflow-x:hidden;width:100%;max-width:100%;box-sizing:border-box}
  .dup-btn{display:none!important}
  .fab{display:none!important}
  .fab-filter{display:none!important}
}
.bn-fab-wrap{flex:1;display:flex;justify-content:center;align-items:center;position:relative}
.bn-fab{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,#4361ee,#7c3aed);color:#fff;border:4px solid var(--bg);font-size:26px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 22px rgba(67,97,238,.6),0 0 40px rgba(67,97,238,.3);margin-top:-22px;position:relative;z-index:5;transition:transform .2s;outline:none;font-family:inherit;-webkit-tap-highlight-color:transparent}
.bn-fab:active,.bn-fab.menu-open{transform:rotate(45deg) scale(.93)}
.bn-fab::before,.bn-fab::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:2px solid var(--primary);opacity:0;pointer-events:none}
.bn-fab.menu-open::before{animation:bnRipple 1.2s ease-out infinite}

/* ═══════════════════════════════════════════════════════════
   AURORA THEME OVERRIDE — presvlači postojeću app (dark + neon)
   Mijenja samo izgled. Sva logika i feature ostaju netaknuti.
   ═══════════════════════════════════════════════════════════ */
:root, body.dark{
  --bg:#0A0B11; --card:rgba(255,255,255,0.045); --card-solid:#15161F;
  --text:#EEF0F6; --sub:#8A8FA3; --border:rgba(255,255,255,0.08);
  --primary:#8B5CF6; --glass-blur:24px; --glow:rgba(139,92,246,0.35); --r:22px;
}
/* Aurora aura — isti za oba moda (forsiramo dark svejedno) */
body::before, body.dark::before, body:not(.dark)::before{
  background:
    radial-gradient(80% 45% at 12% 0%, rgba(139,92,246,.22), transparent 60%),
    radial-gradient(72% 42% at 100% 5%, rgba(34,211,238,.15), transparent 55%),
    radial-gradient(70% 55% at 50% 108%, rgba(34,211,238,.06), transparent 55%) !important;
}
body:not(.dark){ background:var(--bg)!important; color:var(--text)!important; }
/* neon gradijent na ključnim akcentima (violet → cyan) */
.hero-card{ background:linear-gradient(150deg,#7C3AED 0%,#22D3EE 100%)!important;
  box-shadow:0 10px 36px rgba(124,92,255,.4),0 0 60px rgba(34,211,238,.18)!important;
  border:1px solid rgba(255,255,255,.16)!important; }
.fab{ background:linear-gradient(145deg,#8B5CF6,#22D3EE)!important;
  box-shadow:0 8px 30px rgba(124,92,255,.55),0 0 40px rgba(34,211,238,.22)!important; }
.btn-primary, body:not(.dark) .btn-primary{
  background:linear-gradient(135deg,#8B5CF6,#22D3EE)!important; color:#fff!important;
  box-shadow:0 8px 24px rgba(124,92,255,.4)!important; }
.nav-item.active, body:not(.dark) .nav-item.active{
  background:rgba(139,92,246,.16)!important; color:#C4B5FD!important;
  box-shadow:inset 0 0 0 1px rgba(139,92,246,.4),0 0 20px rgba(139,92,246,.28)!important;
  text-shadow:0 0 18px rgba(139,92,246,.45)!important; }
/* tag/badge za broj filtera, sync dot itd. ostaju, samo akcent boja preko --primary */

let curCurrency=localStorage.getItem('currency')||'EUR';
let curRate=1;
let _pendingCurrency=curCurrency;
let _fetchingRate=false;
(function initCurrencyRate(){
  if(curCurrency==='EUR'){curRate=1;return;}
  try{const c=JSON.parse(localStorage.getItem('rate_'+curCurrency)||'null');if(c&&c.rate)curRate=c.rate;}catch{}
})();
async function fetchRates(force){
  if(curCurrency==='EUR'){curRate=1;_fetchingRate=false;return;}
  const key='rate_'+curCurrency;
  if(!force){
    try{
      const c=JSON.parse(localStorage.getItem(key)||'null');
      if(c&&c.rate&&Date.now()-c.ts<3600000){curRate=c.rate;_fetchingRate=false;return;}
    }catch{}
  }
  try{
    const r=await fetch('https://api.frankfurter.app/latest?from=EUR&to='+curCurrency);
    const d=await r.json();
    if(d.rates&&d.rates[curCurrency]){
      curRate=d.rates[curCurrency];
      localStorage.setItem(key,JSON.stringify({rate:curRate,ts:Date.now()}));
    }
  }catch(e){console.warn('Rate fetch failed',e);}
  _fetchingRate=false;
}
function stageCurrency(code){
  _pendingCurrency=code;
  renderSettings();
}
function saveSettings(){
  if(_pendingCurrency!==curCurrency){
    curCurrency=_pendingCurrency;
    localStorage.setItem('currency',curCurrency);
    localStorage.removeItem('rate_'+curCurrency);
    _fetchingRate=true;
    renderSettings();
    // show loading state on freshly rendered button
    const btn=document.getElementById('settings-save-btn');
    if(btn){btn.textContent='⏳ Primjenjujem...';btn.disabled=true;btn.style.opacity='.7';}
    fetchRates(true).then(()=>{
      // re-render ALL data views so amounts convert immediately
      if(APP.view==='dashboard')renderDashboard();
      else if(APP.view==='expenses')renderExpenses();
      else if(APP.view==='profile')renderProfile();
      renderSettings();
      // show success on freshly rendered button
      const b=document.getElementById('settings-save-btn');
      if(b){b.textContent='✓ Sačuvano!';b.style.background='#10b981';b.style.opacity='1';b.disabled=false;setTimeout(()=>renderSettings(),2000);}
    });
  } else {
    const btn=document.getElementById('settings-save-btn');
    if(btn){btn.textContent='✓ Sačuvano!';btn.style.background='#10b981';setTimeout(()=>renderSettings(),1500);}
  }
}

  const f=Math.abs(v).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2});
  return cur.pre?cur.sym+f:f+' '+cur.sym;
}

async function connectSupabase(){
  await withTimeout(migrateUserExpenses(),5000);
  await withTimeout(migrateIncomeFromLS(),5000);
  await withTimeout(seedIfEmpty(),12000);
  await Promise.all([withTimeout(loadAll(),10000),withTimeout(loadIncome(),8000)]);
  setSyncStatus('online','Sinkronizovano');
  sb.channel('exp-rt').on('postgres_changes',{event:'*',schema:'public',table:'expenses'},handleRT).subscribe();
  sb.channel('inc-rt').on('postgres_changes',{event:'*',schema:'public',table:'income_entries'},handleIncomeRT).subscribe();
  // Real-time settings sync — propagira promjene na sve uređaje odmah
  sb.channel('settings-rt').on('postgres_changes',{event:'UPDATE',schema:'public',table:'user_settings',filter:`user_id=eq.${APP.user.id}`},(payload)=>{
    const s=payload.new?.settings;if(!s)return;
    let changed=false;
    Object.entries(s).forEach(([k,v])=>{
      const str=typeof v==='object'?JSON.stringify(v):String(v);
      if(localStorage.getItem(k)!==str){_lsSet(k,str);changed=true;}
    });
    if(changed){
      APP.dark=localStorage.getItem('dark')==='true';
      document.body.classList.toggle('dark',APP.dark);
      APP.budget=parseInt(localStorage.getItem('budget')||'0');
      renderView(APP.view);
    }
  }).subscribe();
}
async function loadIncome(){
  const{data,error}=await sb.from('income_entries').select('*').order('date',{ascending:false}).order('id',{ascending:false});
  if(error)throw error;
  APP.income=data.map(fromIncRow);
}
function fromIncRow(r){return{id:r.id,amount:parseFloat(r.amount),type:r.type||'Plata',method:r.method||'Keš',date:r.date,month:(r.date||'').substring(0,7)};}
function handleIncomeRT({eventType,new:nr,old:or}){
  if(eventType==='INSERT'){const e=fromIncRow(nr);if(!APP.income.find(x=>x.id===e.id)){APP.income.unshift(e);APP.income.sort((a,b)=>b.date.localeCompare(a.date));}}
  else if(eventType==='UPDATE'){const i=APP.income.findIndex(x=>x.id===(or?.id||nr?.id));if(i>=0)APP.income[i]=fromIncRow(nr);}
  else if(eventType==='DELETE'){APP.income=APP.income.filter(x=>x.id!==or.id);}
  if(APP.view==='expenses')renderExpenses();
}

async function init(){
  mobRefreshCheckOnLoad();
  restoreUiState();
  if(APP.dark)document.body.classList.add('dark');
  document.querySelectorAll('[data-view]').forEach(el=>el.addEventListener('click',()=>navigate(el.dataset.view)));
  window.addEventListener('hashchange',()=>{const v=location.hash.replace('#','')||'dashboard';if(['dashboard','expenses','settings','profile'].includes(v))renderView(v)});
  document.addEventListener('click',e=>{if(!e.target.closest('.autocomplete-wrap')){const l=document.getElementById('ac-list');if(l)l.style.display='none'}});
  const hash=location.hash.replace('#','');
  const validHash=['dashboard','expenses','settings','profile'].includes(hash);
  const view=validHash?hash:(APP.view||'dashboard');
  // Create Supabase client
  if(typeof supabase==='undefined'){showErrorBanner('JS biblioteka nije učitana.');return;}
  sb=supabase.createClient(SURL,SKEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:false}});
  // Interceptor — svaki localStorage.setItem za synced ključeve automatski push na Supabase
  localStorage.setItem=function(key,value){_lsSet(key,value);if(SYNCED_KEYS.includes(key))_schedPush();};
  // Check existing session
  const{data:{session}}=await sb.auth.getSession();
  if(!session){
    document.getElementById('loading-overlay').style.display='none';
    showLoginScreen();
    return;
  }
  APP.user=session.user;
  sb.auth.onAuthStateChange((event,sess)=>{
    if(event==='SIGNED_OUT'){APP.user=null;APP.expenses=[];APP.income=[];localStorage.removeItem('exp_c');showLoginScreen();}
    if(event==='SIGNED_IN'&&sess)APP.user=sess.user;
  });
  // Učitaj settings iz Supabase prije prvog rendera
  await loadUserSettings();
  const cached=loadCache();
  if(cached){
    APP.expenses=cached;
    document.getElementById('loading-overlay').style.display='none';
    migrateRateEntries();
    renderView(view);
    initLongPress();
    setSyncStatus('syncing','Sinkronizujem...');
    connectSupabase().then(()=>{renderView(APP.view);}).catch(e=>{
      console.warn('Background sync failed:',e?.message);
      setSyncStatus('error','Keš prikazan · offline');
    });
    return;
  }
  setSyncStatus('syncing','Povežujem...');
  try{
    await connectSupabase();
  }catch(e){
    console.error(e);
    setSyncStatus('error','Greška veze');
    const msg=e?.message||e?.details||e?.hint||JSON.stringify(e)||'Nepoznata greška';
    document.getElementById('loading-overlay').style.display='none';
    renderView(view);
    showErrorBanner(msg);
    return;
  }
  document.getElementById('loading-overlay').style.display='none';
  updateUserUI();
  fetchRates().then(()=>{if(curCurrency!=='EUR')renderView(APP.view);});
  migrateRateEntries();
  renderView(view);
  initLongPress();
}

function migrateRateEntries(){
  // Jednokratna migracija: ako rate_entries postoji ali nema Multicom unos, dodaj ga
  try{
    const raw=localStorage.getItem('rate_entries');
    const entries=raw?JSON.parse(raw):[];
    const hasMulticom=entries.some(e=>e.desc==='Xiaomi usisivač'&&e.povjerioc==='Multicom');
    if(!hasMulticom){
      entries.push({id:1748000000001,desc:'Xiaomi usisivač',povjerioc:'Multicom',method:'Kartica',iznos_rate:37.42,broj_rata:24,ukupno:898.08,datum_pocetka:'2026-02-17',placene_rate:4});

    }
  }catch(e){console.warn('migrateRateEntries',e);}
}

async function seedIfEmpty(){
  const{count,error:ce}=await sb.from('expenses').select('*',{count:'exact',head:true});
  if(ce)throw ce;
  if(count>0)return;
  document.getElementById('loading-text').textContent='Dodajem podatke (samo prvi put)...';
  const rows=SEED.map(e=>({description:e.desc,expense_date:e.date,amount:e.amount,method:e.method,category:getCat(e.desc).id,note:''}));
  const chunks=[];
  for(let i=0;i<rows.length;i+=50)chunks.push(rows.slice(i,i+50));
  const results=await Promise.all(chunks.map(c=>sb.from('expenses').insert(c)));
  const err=results.find(r=>r.error);
  if(err)throw err.error;
}

async function loadAll(){
  const{data,error}=await sb.from('expenses').select('*').order('expense_date',{ascending:false}).order('id',{ascending:false});

}

function handleRT({eventType,new:nr,old:or}){
  setSyncStatus('syncing','Sinkronizujem...');
  if(eventType==='INSERT'){const e=fromRow(nr);if(!APP.expenses.find(x=>x.id===e.id)){APP.expenses.unshift(e);APP.expenses.sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id)}}
  else if(eventType==='UPDATE'){const i=APP.expenses.findIndex(x=>x.id===or.id);if(i>=0)APP.expenses[i]=fromRow(nr)}

    const allInc=getIncomeEntries();

      if(imethods.length&&!imethods.includes(e.method))return false;
      return true;
    });

function initMonthSwipe(containerId, mode){
  const el=document.getElementById(containerId);
  if(!el||el._mswipe)return;
  el._mswipe=true;
  let sx=0,sy=0,cx=0,cy=0,dragging=false,moved=false,axis=null;
  const getMonths=()=>[...new Set((mode==='income'?getIncomeEntries():APP.expenses).map(e=>e.date.substring(0,7)))].sort();
  const getCur=()=>mode==='income'?_incFilters.month:APP.filters.month;
  const setCur=(m)=>{if(mode==='income'){_incFilters.month=m;}else{APP.filters.month=m;}renderExpenses();}
  const onDown=(x,y)=>{sx=x;sy=y;cx=x;cy=y;dragging=true;moved=false;axis=null;};
  const onMove=(x,y)=>{
    if(!dragging)return;
    cx=x;cy=y;
    const adx=Math.abs(x-sx),ady=Math.abs(y-sy);
    if(!axis&&(adx>8||ady>8))axis=adx>ady?'x':'y';
    if(axis==='x')moved=true;
  };
  const onUp=()=>{
    if(!dragging){return;}
    const wasMoved=moved,wasAxis=axis;
    dragging=false;moved=false;axis=null;
    if(!wasMoved||wasAxis!=='x')return;
    const dx=sx-cx, dy=sy-cy;
    if(Math.abs(dx)<40)return;
    if(Math.abs(dy)>Math.abs(dx))return;
    const months=getMonths();
    const cur=getCur();
    if(!months.length)return;
    if(!cur){setCur(dx>0?months[months.length-1]:months[0]);return;}
    const idx=months.indexOf(cur);
    if(dx>0&&idx>0)setCur(months[idx-1]);
    else if(dx<0&&idx<months.length-1)setCur(months[idx+1]);
    else if(dx<0&&idx===-1)setCur(months[months.length-1]);
    else if(dx>0&&idx===0){setCur('');}
  };
  el.addEventListener('mousedown',e=>{onDown(e.clientX,e.clientY);},{passive:true});
  el.addEventListener('mousemove',e=>{onMove(e.clientX,e.clientY);},{passive:true});
  el.addEventListener('mouseup',e=>{onMove(e.clientX,e.clientY);onUp();},{passive:true});
  el.addEventListener('mouseleave',e=>{if(dragging){onMove(e.clientX,e.clientY);onUp();}},{passive:true});
  el.addEventListener('touchstart',e=>{onDown(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  el.addEventListener('touchmove',e=>{onMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  el.addEventListener('touchend',e=>{const t=e.changedTouches[0];onMove(t.clientX,t.clientY);onUp();},{passive:true});
  el.addEventListener('touchcancel',()=>{onUp();},{passive:true});
}

function endWDrag(e){if(!wDragEl||!wDragId)return;document.removeEventListener('mousemove',onWDragMove);document.removeEventListener('touchmove',onWDragMove);document.removeEventListener('mouseup',endWDrag);document.removeEventListener('touchend',endWDrag);if(wDragHoverEl){wDragHoverEl.classList.remove('drag-over');wDragHoverEl=null;}const y=e.changedTouches?e.changedTouches[0].clientY:e.clientY;let targetId=null;document.querySelectorAll('.widget-row').forEach(r=>{if(r===wDragEl)return;const rc=r.getBoundingClientRect();if(y>=rc.top&&y<=rc.bottom)targetId=r.dataset.wid;});wDragEl.style.transition='transform .22s cubic-bezier(.2,.8,.4,1)';wDragEl.style.transform='';const _el=wDragEl,_id=wDragId;wDragEl=null;wDragId=null;setTimeout(()=>{_el.style.transition='';_el.style.position='';_el.style.zIndex='';_el.classList.remove('dragging');if(targetId&&targetId!==_id){const order=getWidgetOrder();const fi=order.indexOf(_id),ti=order.indexOf(targetId);if(fi>=0&&ti>=0){order.splice(fi,1);order.splice(ti,0,_id);saveWidgetOrder(order);renderSettings();renderDashboard();}}},220);}

function saveInitialBalance(type){
  const amt=document.getElementById(`init-${type}-amount`)?.value;
  const date=document.getElementById(`init-${type}-date`)?.value;
  if(!amt&&!date)return;
  const label=type==='kartica'?'Kartica':'Keš';
  const fmtAmt=amt?`€ ${parseAmt(amt).toLocaleString('bs',{minimumFractionDigits:2,maximumFractionDigits:2})}`:'—';
  const fmtDate=date?date.split('-').reverse().join('.'):'—';
  document.getElementById('sheet-confirm-body').innerHTML=`
    <div style="text-align:center;margin-bottom:18px">
      <div style="font-size:36px;margin-bottom:10px">💳</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:6px">Promjena početnog stanja</div>
      <div style="font-size:13px;color:var(--sub);margin-bottom:16px">Jesi li siguran da želiš promijeniti početno stanje za <b>${label}</b>?</div>
      <div style="background:var(--bg);border-radius:12px;padding:12px 16px;display:grid;grid-template-columns:1fr 1fr;gap:8px;text-align:left;margin-bottom:20px">
        <div><div style="font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">Novo stanje</div><div style="font-size:15px;font-weight:700">${fmtAmt}</div></div>
        <div><div style="font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">Od datuma</div><div style="font-size:15px;font-weight:700">${fmtDate}</div></div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <button class="btn btn-ghost" onclick="closeAllSheets()">Odustani</button>
      <button class="btn btn-primary" onclick="confirmSaveInitialBalance('${type}','${amt}','${date}')">Potvrdi</button>
    </div>`;
  openSheet('sheet-confirm');
}
async function confirmSaveInitialBalance(type,amt,date){
  if(amt!==undefined&&amt!=='')localStorage.setItem(`savings_offset_${type}`,parseAmt(amt));
  if(date)localStorage.setItem(`savings_start_${type}`,date);
  closeAllSheets();
  // Renderuj trenutni view (najčešće Postavke) da se input vrijednosti odmah ažuriraju.
  // Dashboard se rebilduje kad korisnik switchne tab.
  renderView(APP.view);
  // Force-flush pending debounced push pa odmah upiši u Supabase —
  // bez ovoga refresh prije 600ms vraća staru vrijednost iz clouda.
  if(_pushTimer){clearTimeout(_pushTimer);_pushTimer=null;}
  try{await pushUserSettings();}catch(e){console.warn('save initial balance push failed',e);}
}

function getRateEntries(){
  try{
    const raw=localStorage.getItem('rate_entries');
    if(raw===null){
      // Nikad nije postavljeno — seed sa Multicom ratom
      const seed=[{id:1748000000001,desc:'Xiaomi usisivač',povjerioc:'Multicom',method:'Kartica',iznos_rate:37.42,broj_rata:24,ukupno:898.08,datum_pocetka:'2026-02-17',placene_rate:4}];
      localStorage.setItem('rate_entries',JSON.stringify(seed));
      return seed;
    }
    return JSON.parse(raw)||[];
  }catch{return[];}
}
function saveRateEntries(entries){localStorage.setItem('rate_entries',JSON.stringify(entries));}

function buildRateWidget(){
  const entries=getRateEntries();
  if(!entries.length){return`<div style="text-align:center;padding:16px 0 8px;color:var(--sub)"><div style="font-size:32px;margin-bottom:8px">📦</div><div style="font-size:14px">Nemaš aktivnih rata</div></div>`;}
  const active=entries.filter(e=>(e.placene_rate||0)<e.broj_rata);
  const totalMonthly=active.reduce((s,e)=>s+(e.iznos_rate||0),0);
  const totalRemaining=active.reduce((s,e)=>s+Math.max(0,(e.broj_rata-(e.placene_rate||0))*(e.iznos_rate||0)),0);
  const summaryHTML=active.length?`<div style="background:rgba(99,102,241,0.08);border-radius:14px;padding:12px 14px;margin-bottom:14px;display:grid;grid-template-columns:1fr 1fr;gap:8px">
    <div><div style="font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">Mj. obaveza</div><div style="font-size:18px;font-weight:800">${fmt(totalMonthly)}</div></div>
    <div><div style="font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">Ukupno preostalo</div><div style="font-size:18px;font-weight:800">${fmt(totalRemaining)}</div></div>
  </div>`:'';
  const itemsHTML=entries.map(e=>{
    const paid=e.placene_rate||0;
    const total=e.broj_rata||1;
    const remaining=Math.max(0,total-paid);
    const pct=Math.round((paid/total)*100);
    const amtRemaining=remaining*(e.iznos_rate||0);
    const done=paid>=total;
    return`<div style="background:var(--bg);border-radius:16px;padding:14px 14px 12px;margin-bottom:10px;${done?'opacity:0.65':''}">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:${e.povjerioc?'4px':'8px'}">
        <div style="font-weight:700;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;margin-right:8px">${esc(e.desc)}</div>
        <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
          ${!done?`<button onclick="incRatePaid(${e.id})" style="background:rgba(99,102,241,0.15);border:none;border-radius:8px;padding:4px 10px;color:var(--primary);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">+1</button>`:`<span style="font-size:11px;color:#10b981;font-weight:700">✓ Plaćeno</span>`}
          <button onclick="deleteRate(${e.id})" style="background:rgba(239,68,68,0.1);border:none;border-radius:8px;padding:4px 8px;color:#ef4444;font-size:13px;cursor:pointer;font-family:inherit">🗑️</button>
        </div>
      </div>
      ${e.povjerioc?`<div style="margin-bottom:8px"><span style="font-size:11px;color:var(--sub);background:var(--border);border-radius:6px;padding:2px 8px;font-weight:500">🏦 ${esc(e.povjerioc)}</span></div>`:''}
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div style="flex:1;height:6px;background:var(--border);border-radius:99px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${done?'#10b981':'var(--primary)'};border-radius:99px"></div>
        </div>
        <span style="font-size:12px;color:var(--sub);flex-shrink:0;font-weight:600">${paid}/${total}</span>
      </div>
      <div style="display:flex;gap:14px;font-size:12px;color:var(--sub)">
        <span>💰 <b style="color:var(--text)">${fmt(e.iznos_rate)}</b>/rata</span>
        ${!done?`<span>⏳ Ostalo: <b style="color:var(--text)">${fmt(amtRemaining)}</b></span>`:`<span>✅ Ukupno: <b style="color:var(--text)">${fmt(e.ukupno||e.iznos_rate*e.broj_rata)}</b></span>`}
      </div>
    </div>`;
  }).join('');
  return summaryHTML+itemsHTML;
}

    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="form-group"><label class="form-label">Ukupna cijena (€) <span style="color:var(--sub);font-size:11px">— auto</span></label><input type="text" inputmode="decimal" autocomplete="off" pattern="[0-9]*[.,]?[0-9]{0,2}" class="form-control" id="rate-ukupno" placeholder="600,00"></div>
      <div class="form-group"><label class="form-label">Metoda plaćanja</label><select class="form-control" id="rate-method">${methodOpts}</select></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">

      <div class="form-group"><label class="form-label">Datum prve rate</label><input type="date" class="form-control" id="rate-datum" value="${today}"></div>

function autoCalcRateUkupno(){
  const iznos=parseAmt(document.getElementById('rate-iznos')?.value||'0');
  const broj=parseInt(document.getElementById('rate-broj')?.value||'0');
  if(iznos>0&&broj>0){document.getElementById('rate-ukupno').value=(iznos*broj).toFixed(2);}
}

function submitAddRate(){
  const desc=(document.getElementById('rate-desc')?.value||'').trim();
  const povjerioc=(document.getElementById('rate-povjerioc')?.value||'').trim();
  const iznos=parseAmt(document.getElementById('rate-iznos')?.value||'0');
  const broj=parseInt(document.getElementById('rate-broj')?.value||'0');
  const ukupnoRaw=document.getElementById('rate-ukupno')?.value;
  const method=document.getElementById('rate-method')?.value||'Kartica';
  const datum=document.getElementById('rate-datum')?.value||new Date().toISOString().split('T')[0];
  const vecPlaceno=Math.max(0,parseInt(document.getElementById('rate-vec-placeno')?.value||'0')||0);
  if(!desc){alert('Upiši opis kupovine');return;}
  if(!iznos||iznos<=0){alert('Upiši iznos rate');return;}
  if(!broj||broj<1){alert('Upiši broj rata');return;}
  if(vecPlaceno>broj){alert('Već plaćene rate ne mogu biti veće od ukupnog broja rata');return;}
  const ukupno=ukupnoRaw&&parseAmt(ukupnoRaw)>0?parseAmt(ukupnoRaw):iznos*broj;
  const entries=getRateEntries();
  entries.push({id:Date.now(),desc,povjerioc,method,iznos_rate:iznos,broj_rata:broj,ukupno,datum_pocetka:datum,placene_rate:vecPlaceno});
  saveRateEntries(entries);
  closeAllSheets();
  renderDashboard();
}

function deleteRate(id){
  saveRateEntries(getRateEntries().filter(e=>e.id!==id));
  renderDashboard();
}

async function incRatePaid(id){
  const entries=getRateEntries();
  const e=entries.find(x=>x.id===id);
  if(!e||(e.placene_rate||0)>=e.broj_rata)return;
  e.placene_rate=(e.placene_rate||0)+1;
  saveRateEntries(entries);
  // Kreiraj trošak u Supabase
  const today=new Date().toISOString().split('T')[0];
  const expDesc=`Rata ${e.placene_rate}/${e.broj_rata}: ${e.desc}${e.povjerioc?' ('+e.povjerioc+')':''}`;
  const expMethod=e.method||'Kartica';
  try{
    const{data:ins,error}=await sb.from('expenses').insert({
      description:expDesc,
      expense_date:today,
      amount:e.iznos_rate,
      method:expMethod,
      category:getCat(expDesc).id,
      note:'',
      user_id:APP.user?.id
    }).select().single();
    if(error)throw error;
    APP.expenses.unshift(fromRow(ins));
    APP.expenses.sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id);
    showSuccessToast(e.iznos_rate);
  }catch(err){console.error('Rate expense insert failed',err);}
  renderDashboard();
}

function autoCalcFormRateUkupno(){
  const iznos=parseAmt(document.getElementById('f-amount')?.value||'0');
  const broj=parseInt(document.getElementById('f-rate-broj')?.value||'0');
  const u=document.getElementById('f-rate-ukupno');
  if(iznos>0&&broj>0&&u)u.value=(iznos*broj).toFixed(2);
}
function getFormData(){
  const desc=(document.getElementById('f-desc')?.value||'').trim();
  const amount=parseAmt(document.getElementById('f-amount')?.value||'');
  const date=document.getElementById('f-date')?.value||'';
  const method=document.getElementById('f-method')?.value||'Kartica';
  const category=document.getElementById('f-cat')?.value||'ostalo';
  const freq=document.getElementById('f-freq')?.value||'mjescna';
  let note=(document.getElementById('f-note')?.value||'').trim();
  if(category==='pretplate'&&freq==='godisnja')note='[Godišnja] '+note;
  if(!desc){alert('Upiši opis');return null}
  if(!amount||amount<=0){alert('Unesi ispravan iznos');return null}
  if(!date){alert('Izaberi datum');return null}
  if(category==='rate'){const broj=parseInt(document.getElementById('f-rate-broj')?.value||'0');if(!broj||broj<1){alert('Upiši broj rata');return null;}}
  return{desc,amount,date,method,category,note}
}

  const data=getFormData();if(!data)return;
  const btn=document.querySelector('#sheet-add .btn-primary');if(btn)btn.disabled=true;
  setSyncStatus('syncing','Dodajem...');
  // Rate sinhronizacija
  let expDesc=data.desc;
  let expNote=data.note;
  if(data.category==='rate'){
    const povjerioc=(document.getElementById('f-rate-povjerioc')?.value||'').trim();
    const broj=parseInt(document.getElementById('f-rate-broj')?.value||'1')||1;
    const ukupnoRaw=document.getElementById('f-rate-ukupno')?.value;
    const vecPlaceno=Math.max(0,parseInt(document.getElementById('f-rate-vec')?.value||'0')||0);
    const ukupno=ukupnoRaw&&parseFloat(ukupnoRaw)>0?parseFloat(ukupnoRaw):data.amount*broj;
    const rataNum=vecPlaceno+1;
    expDesc=`Rata ${rataNum}/${broj}: ${data.desc}${povjerioc?' ('+povjerioc+')':''}`;
    expNote=povjerioc?`Povjerioc: ${povjerioc}`:(data.note||'');
    // Upiši/ažuriraj Rate widget entry

function initSheetSwipe(el){
  if(!el||el._swipeInit)return;
  el._swipeInit=true;
  let startY=0,startScroll=0,dragging=false;
  function onStart(e){
    startY=e.touches[0].clientY;
    startScroll=el.scrollTop;
    dragging=true;
  }
  function onMove(e){
    if(!dragging)return;
    const dy=e.touches[0].clientY-startY;
    if(dy<=0||startScroll>0)return;
    e.preventDefault();
    el.style.transition='none';
    el.style.transform=`translateY(${dy}px)`;
    document.getElementById('overlay').style.opacity=Math.max(0,0.5-dy/600);
  }
  function onEnd(e){
    if(!dragging)return;
    dragging=false;
    const dy=e.changedTouches[0].clientY-startY;
    el.style.transition='';
    el.style.transform='';
    document.getElementById('overlay').style.opacity='';
    if(dy>90)closeAllSheets();
  }
  el.removeEventListener('touchstart',el._ssStart);
  el.removeEventListener('touchmove',el._ssMove);
  el.removeEventListener('touchend',el._ssEnd);
  el._ssStart=onStart;el._ssMove=onMove;el._ssEnd=onEnd;
  el.addEventListener('touchstart',onStart,{passive:true});
  el.addEventListener('touchmove',onMove,{passive:false});
  el.addEventListener('touchend',onEnd,{passive:true});
}

(function initPullToRefresh(){
  if(!('ontouchstart' in window))return;
  const ptr=document.getElementById('ptr');
  const main=document.getElementById('main');
  if(!ptr||!main)return;
  const ICON=ptr.querySelector('svg');
  const THRESH=80,MAX=140,HOLD=60;
  let startY=0,startX=0,dy=0,tracking=false,refreshing=false,bailed=false,axis=null;
  const interferes=(el)=>!!(el&&el.closest&&el.closest('.bottom-sheet,.hero-scroll,.ac-list,input,textarea,select,#ctx-menu,#fab-menu,#sidebar,#bottom-nav'));
  const reset=(animate)=>{
    const trans=animate?'transform .25s cubic-bezier(.2,.8,.3,1),opacity .25s ease':'none';
    ptr.style.transition=trans;
    main.style.transition=animate?'transform .25s cubic-bezier(.2,.8,.3,1)':'none';
    ptr.style.opacity='0';
    ptr.style.transform='translate(-50%,-60px)';
    main.style.transform='';
    if(ICON)ICON.style.transform='';
  };
  document.addEventListener('touchstart',(e)=>{
    if(refreshing){tracking=false;return;}
    bailed=false;axis=null;
    if((window.scrollY||window.pageYOffset||0)>0){tracking=false;return;}
    if(document.body.style.overflow==='hidden'){tracking=false;return;}
    if(interferes(e.target)){tracking=false;return;}
    startY=e.touches[0].clientY;
    startX=e.touches[0].clientX;
    dy=0;
    tracking=true;
  },{passive:true});
  document.addEventListener('touchmove',(e)=>{
    if(!tracking||refreshing||bailed)return;
    const y=e.touches[0].clientY;
    const x=e.touches[0].clientX;
    dy=y-startY;
    const adx=Math.abs(x-startX),ady=Math.abs(dy);
    if(!axis&&(adx>8||ady>8))axis=ady>adx?'y':'x';
    if(axis==='x'){bailed=true;reset(true);return;}
    if((window.scrollY||window.pageYOffset||0)>0){bailed=true;reset(true);return;}
    if(dy<=0){if(ptr.style.opacity!=='0')reset(false);return;}
    if(e.cancelable)e.preventDefault();
    const cap=Math.min(dy,MAX);
    ptr.style.transition='none';
    main.style.transition='none';
    ptr.style.opacity=String(Math.min(1,dy/30));
    ptr.style.transform=`translate(-50%,${cap-60}px)`;
    main.style.transform=`translate3d(0,${cap}px,0)`;
    if(ICON)ICON.style.transform=`rotate(${Math.min(180,dy*180/THRESH)}deg)`;
  },{passive:false});
  const finish=()=>{
    if(!tracking)return;
    const triggered=dy>=THRESH&&!bailed;
    tracking=false;
    if(triggered&&!refreshing){
      refreshing=true;
      try{if(navigator.vibrate)navigator.vibrate(15);}catch(_){}
      try{if(typeof saveUiState==='function')saveUiState();}catch(_){}
      ptr.classList.add('refreshing');
      ptr.style.transition='transform .2s cubic-bezier(.2,.8,.3,1),opacity .2s ease';
      main.style.transition='transform .2s cubic-bezier(.2,.8,.3,1)';
      ptr.style.opacity='1';
      ptr.style.transform=`translate(-50%,${HOLD-60}px)`;
      main.style.transform=`translate3d(0,${HOLD}px,0)`;
      if(ICON)ICON.style.transform='';
      setTimeout(()=>{try{location.reload();}catch(_){window.location.href=location.pathname+'?_v='+Date.now();}},420);
    }else{
      reset(true);
    }
    dy=0;
  };
  document.addEventListener('touchend',finish,{passive:true});
  document.addEventListener('touchcancel',finish,{passive:true});
})();

function initDragScroll(el){

  let down=false,startX=0,sl=0;
  el.addEventListener('mousedown',e=>{
    down=true;startX=e.pageX-el.offsetLeft;sl=el.scrollLeft;
    el.classList.add('dragging');e.preventDefault();
  });
  const stop=()=>{down=false;el.classList.remove('dragging');};
  el.addEventListener('mouseleave',stop);
  el.addEventListener('mouseup',stop);
  el.addEventListener('mousemove',e=>{
    if(!down)return;e.preventDefault();
    el.scrollLeft=sl-(e.pageX-el.offsetLeft-startX)*1.4;
  });
}

          <div class="form-group"><label class="form-label">Spol</label><select class="form-control" id="p-gender"><option value="">—</option><option value="muski"${m.gender==='muski'?' selected':''}>Muški</option><option value="zenski"${m.gender==='zenski'?' selected':''}>Ženski</option></select></div>

            <button class="btn btn-primary" onclick="saveBudget()">Sačuvaj</button>
          </div>

}

async function saveProfile(){
  const fn=(document.getElementById('p-firstname')?.value||'').trim();
  const ln=(document.getElementById('p-lastname')?.value||'').trim();
  const un=(document.getElementById('p-username')?.value||'').trim();
  const bd=document.getElementById('p-birthdate')?.value||'';
  const gd=document.getElementById('p-gender')?.value||'';
  try{
    const{error}=await sb.auth.updateUser({data:{first_name:fn,last_name:ln,username:un,birth_date:bd,gender:gd}});
    if(error)throw error;
    if(APP.user)APP.user.user_metadata={...APP.user.user_metadata,first_name:fn,last_name:ln,username:un,birth_date:bd,gender:gd};
    updateUserUI();renderProfile();
    showSettingsMsg('p-msg','✓ Profil sačuvan',true);
  }catch(e){showSettingsMsg('p-msg',e.message,false);}
}

async function saveUsername(){
  const val=(document.getElementById('s-username')?.value||'').trim();
  if(!val){showSettingsMsg('s-uname-msg','Upiši ime',false);return;}
  try{
    const{error}=await sb.auth.updateUser({data:{username:val}});
    if(error)throw error;
    if(APP.user)APP.user.user_metadata={...APP.user.user_metadata,username:val};
    updateUserUI();
    showSettingsMsg('s-uname-msg','✓ Sačuvano',true);
  }catch(e){showSettingsMsg('s-uname-msg',e.message,false);}
}

async function changePassword(){
  const p1=document.getElementById('s-pass1')?.value||'';
  const p2=document.getElementById('s-pass2')?.value||'';
  if(!p1){showSettingsMsg('s-pass-msg','Upiši novu lozinku',false);return;}
  if(p1.length<6){showSettingsMsg('s-pass-msg','Minimalno 6 znakova',false);return;}
  if(p1!==p2){showSettingsMsg('s-pass-msg','Lozinke se ne podudaraju',false);return;}
  try{
    const{error}=await sb.auth.updateUser({password:p1});
    if(error)throw error;
    document.getElementById('s-pass1').value='';
    document.getElementById('s-pass2').value='';
    showSettingsMsg('s-pass-msg','✓ Lozinka promijenjena',true);
  }catch(e){showSettingsMsg('s-pass-msg',e.message,false);}
}

// ===== FAB MENU =====
function _allFabBtns(){return[document.getElementById('bn-fab'),document.getElementById('fab-add')].filter(Boolean);}
function toggleFabMenu(){
  const menu=document.getElementById('fab-menu');
  const overlay=document.getElementById('fab-overlay');
  if(!menu||!overlay)return;
  const isOpen=menu.classList.contains('show');
  if(isOpen){closeFabMenu();}
  else{
    _allFabBtns().forEach(b=>b.classList.add('menu-open'));
    overlay.classList.add('show');
    menu.classList.add('show');
    menu.style.display='flex';
  }
}
function closeFabMenu(){
  const menu=document.getElementById('fab-menu');
  const overlay=document.getElementById('fab-overlay');
  _allFabBtns().forEach(b=>b.classList.remove('menu-open'));
  if(!menu||!menu.classList.contains('show'))return;
  menu.classList.add('closing');
  if(overlay){overlay.classList.add('hiding');}
  setTimeout(()=>{
    menu.classList.remove('show','closing');
    menu.style.display='none';
    if(overlay){overlay.classList.remove('show','hiding');}
  },400);
}
function openAddIncome(){openAddIncomeSheet();}
function openAddMethodInline(){navigate('settings');setTimeout(()=>{const el=document.getElementById('new-method-name');if(el){el.focus();el.scrollIntoView({behavior:'smooth',block:'center'});}},300);}

// ===== SUCCESS ANIMATION =====
function showSuccessToast(amount){
  const toast=document.getElementById('success-toast');
  const amtEl=document.getElementById('success-toast-amount');
  if(!toast)return;
  if(amtEl&&amount)amtEl.textContent=fmt(amount)+' dodano';
  toast.classList.remove('show');
  void toast.offsetWidth;
  toast.classList.add('show');
  // Confetti
  const container=document.createElement('div');
  container.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:2999;overflow:hidden';
  document.body.appendChild(container);
  const colors=['#4361ee','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4'];
  for(let i=0;i<22;i++){
    const p=document.createElement('div');
    const color=colors[i%colors.length];
    const left=Math.random()*100;
    const size=6+Math.random()*8;
    const delay=Math.random()*0.6;
    const dur=1.2+Math.random()*0.8;
    const shape=Math.random()>.5?'50%':'3px';
    p.style.cssText=`position:absolute;left:${left}%;top:-10px;width:${size}px;height:${size}px;background:${color};border-radius:${shape};animation:confettiFall ${dur}s ${delay}s ease-in forwards`;
    container.appendChild(p);
  }
  setTimeout(()=>{container.remove();toast.classList.remove('show');},2400);
}

let _listTab='expenses';
function setListTab(tab){_listTab=tab;if(tab==='income')_incFilters={search:'',month:'',from:'',to:'',methods:[]};saveUiState();renderExpenses();}

function saveUiState(){
  try{
    localStorage.setItem('_ui',JSON.stringify({
      view:APP.view,
      tab:_listTab,
      filters:APP.filters,
      incFilters:_incFilters,
      months:[...collapsedMonths]
    }));
  }catch(_){}
}
function restoreUiState(){
  try{
    const s=JSON.parse(localStorage.getItem('_ui')||'null');
    if(!s)return;
    if(s.view&&['dashboard','expenses','settings','profile'].includes(s.view))APP.view=s.view;
    if(s.tab&&['expenses','income'].includes(s.tab))_listTab=s.tab;
    if(s.filters&&typeof s.filters==='object')APP.filters=Object.assign({search:'',month:'',from:'',to:'',methods:[],cats:[]},s.filters);
    if(s.incFilters&&typeof s.incFilters==='object')_incFilters=Object.assign({search:'',month:'',from:'',to:'',methods:[]},s.incFilters);
    if(Array.isArray(s.months)){collapsedMonths.clear();s.months.forEach(m=>collapsedMonths.add(m));}
  }catch(_){}
}
function getIncomeEntries(){return APP.income||[];}
let _incMethod='Keš';
function selectIncMethod(m){
  _incMethod=m;
  ['inc-method-cash','inc-method-card'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.classList.remove('inc-method-on');
  });
  const target=m==='Keš'?'inc-method-cash':'inc-method-card';
  const el=document.getElementById(target);if(el)el.classList.add('inc-method-on');
}
function buildIncomeForm(entry){
  const today=new Date().toISOString().split('T')[0];
  const v=entry||{};
  return`
    <div class="form-group"><label class="form-label">Iznos (€)</label><input type="text" inputmode="decimal" autocomplete="off" pattern="[0-9]*[.,]?[0-9]{0,2}" class="form-control" id="inc-amount" value="${v.amount||''}" placeholder="0,00"></div>
    <div class="form-group"><label class="form-label">Vrsta</label><select class="form-control" id="inc-type"><option value="Plata"${(v.type||'Plata')==='Plata'?' selected':''}>💼 Plata</option><option value="Kirija"${v.type==='Kirija'?' selected':''}>🏠 Kirija</option><option value="Vanredno"${v.type==='Vanredno'?' selected':''}>🎁 Vanredno</option></select></div>
    <div class="form-group"><label class="form-label">Način primanja</label><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px"><button type="button" id="inc-method-cash" onclick="selectIncMethod('Keš')" class="inc-method-btn${(v.method||'Keš')==='Keš'?' inc-method-on':''}">💵 Keš</button><button type="button" id="inc-method-card" onclick="selectIncMethod('Kartica')" class="inc-method-btn${v.method==='Kartica'?' inc-method-on':''}">💳 Kartica</button></div></div>
    <div class="form-group"><label class="form-label">Datum primanja</label><input type="date" class="form-control" id="inc-date" value="${v.date||today}" autocomplete="off" style="min-height:48px;-webkit-appearance:none;appearance:none;width:100%;box-sizing:border-box"></div>`;
}
function openAddIncomeSheet(){
  _incMethod='Keš';
  const t=document.getElementById('sheet-income-title');if(t)t.textContent='Dodaj primanje';
  document.getElementById('sheet-income-body').innerHTML=buildIncomeForm(null)+`<button class="btn btn-primary btn-full" style="margin-top:8px" onclick="submitAddIncome()">+ Dodaj primanje</button>`;
  openSheet('sheet-income');
}
function openEditIncomeSheet(id){
  const entry=APP.income.find(e=>e.id==id);
  if(!entry)return;
  _incMethod=entry.method||'Keš';
  const t=document.getElementById('sheet-income-title');if(t)t.textContent='Uredi primanje';
  document.getElementById('sheet-income-body').innerHTML=buildIncomeForm(entry)+`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px"><button class="btn btn-danger" onclick="removeIncomeById(${entry.id})">🗑️ Obriši</button><button class="btn btn-primary" onclick="submitEditIncome(${entry.id})">Sačuvaj</button></div>`;
  openSheet('sheet-income');
}
async function submitAddIncome(){
  const amount=parseAmt(document.getElementById('inc-amount')?.value||'');
  const type=document.getElementById('inc-type')?.value||'Plata';
  const date=document.getElementById('inc-date')?.value||'';
  if(!amount||amount<=0){alert('Upiši ispravan iznos');return;}
  if(!date){alert('Odaberi datum');return;}
  closeAllSheets();
  const{data,error}=await sb.from('income_entries').insert({amount,type,method:_incMethod||'Keš',date,user_id:APP.user?.id}).select().single();
  if(error){alert('Greška: '+error.message);return;}
  APP.income.unshift(fromIncRow(data));
  APP.income.sort((a,b)=>b.date.localeCompare(a.date));
  if(APP.view==='expenses')renderExpenses();
}
async function submitEditIncome(id){
  const amount=parseAmt(document.getElementById('inc-amount')?.value||'');
  const type=document.getElementById('inc-type')?.value||'Plata';
  const date=document.getElementById('inc-date')?.value||'';
  if(!amount||amount<=0){alert('Upiši ispravan iznos');return;}
  closeAllSheets();
  const{error}=await sb.from('income_entries').update({amount,type,method:_incMethod||'Keš',date}).eq('id',id);
  if(error){alert('Greška: '+error.message);return;}
  const i=APP.income.findIndex(e=>e.id==id);
  if(i>=0)APP.income[i]={...APP.income[i],amount,type,method:_incMethod||'Keš',date,month:date.substring(0,7)};
  APP.income.sort((a,b)=>b.date.localeCompare(a.date));
  if(APP.view==='expenses')renderExpenses();
}
async function removeIncomeById(id){
  closeAllSheets();
  const{error}=await sb.from('income_entries').delete().eq('id',id);
  if(error){alert('Greška: '+error.message);return;}
  APP.income=APP.income.filter(e=>e.id!=id);
  if(APP.view==='expenses')renderExpenses();
}
function addIncome(){
  const amount=parseAmt(document.getElementById('inc-amount')?.value||'');
  const type=document.getElementById('inc-type')?.value||'Plata';
  const date=document.getElementById('inc-month')?.value||new Date().toISOString().split('T')[0];
  const method=_incMethod||'Keš';
  if(!amount||amount<=0){alert('Upiši ispravan iznos primanja');return;}
  if(!date){alert('Odaberi datum primanja');return;}
  const entries=getIncomeEntries();
  entries.push({id:Date.now(),amount,type,method,date,month:date.substring(0,7)});
  saveIncomeEntries(entries);
  _incMethod='Keš';
  renderProfile();
}
function removeIncome(idx){
  const entries=getIncomeEntries();
  entries.splice(idx,1);
  saveIncomeEntries(entries);
  renderProfile();
}
function renderIncomeList(entries,totalCount){
  const INC_TYPE_EMOJI={Plata:'💼',Kirija:'🏠',Vanredno:'🎁'};
  const INC_MC={Keš:{color:'#10b981',bg:'#d1fae5'},Kartica:{color:'#4361ee',bg:'#eef0fd'}};
  if(entries===undefined)entries=getIncomeEntries();
  if(!totalCount)totalCount=entries.length;

  if(!totalCount)return`<div class="empty-state"><div class="empty-state-icon">💰</div><div>Nema unesenih primanja</div><div style="margin-top:12px"><button class="btn btn-primary" onclick="openAddIncomeSheet()">+ Dodaj primanje</button></div></div>`;
  if(!entries.length)return`<div class="empty-state"><div class="empty-state-icon">🔍</div><div>Nema rezultata za ove filtere</div></div>`;

  // group by month, newest first
  const grouped={};
  entries.forEach(e=>{const k=(e.date||'').substring(0,7)||e.month||'';if(!grouped[k])grouped[k]=[];grouped[k].push(e);});
  const months=Object.keys(grouped).sort((a,b)=>b.localeCompare(a));

  let html='';
  months.forEach(m=>{
    const items=grouped[m];
    const tot=items.reduce((s,e)=>s+e.amount,0);
    // same month-header style as expenses
    const incKey='inc_'+m;
    const incOpen=!collapsedMonths.has(incKey);
    html+=`<div class="month-header" onclick="toggleMonth('${incKey}')" style="cursor:pointer;user-select:none"><div class="month-dot" style="background:#10b981"></div><span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0">${mnLabel(m)}</span><span style="color:var(--sub);flex-shrink:0;display:inline-flex;align-items:center;transition:transform .2s;transform:rotate(${incOpen?'180deg':'0deg'})"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,6 8,11 13,6"/></svg></span><span style="flex:1"></span><span class="month-chip" style="flex-shrink:0">${items.length} primanja</span><span class="month-total-pill" style="flex-shrink:0">${fmt(tot)}</span></div>`;
    if(incOpen){items.slice().reverse().forEach(e=>{
      const mc=INC_MC[e.method]||{color:'#6366f1',bg:'#ede9fe'};
      html+=`<div class="expense-item" id="inc-${e.id}"><div class="expense-emoji">${INC_TYPE_EMOJI[e.type]||'💰'}</div><div class="expense-info"><div class="expense-desc">${e.type}</div><div class="expense-meta">${fmtDate(e.date)} · ${esc(e.method)}</div></div><div class="expense-right"><button class="dup-btn" onclick="event.stopPropagation();openEditIncomeSheet(${e.id})" title="Uredi" style="color:var(--primary)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><span class="amount-pill">${fmt(e.amount)}</span></div></div>`;
    });}
  });
  return html;
}

function openUserSheet(){
  const email=APP.user?.email||'—';
  const initial=email!=='—'?email[0].toUpperCase():'?';
  document.getElementById('sheet-confirm-body').innerHTML=`
    <div style="text-align:center;padding:4px 0 20px">
      <div style="width:64px;height:64px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;margin:0 auto 12px">${initial}</div>

    </div>
    <button class="btn btn-danger btn-full" onclick="signOut();closeAllSheets()">Odjavi se</button>
  `;
  openSheet('sheet-confirm');

  if(!APP.user)return;
  await sb.from('expenses').update({user_id:APP.user.id}).is('user_id',null);
}
